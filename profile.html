<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil | RHN Preloved</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="nav-root"></div>

<div class="page-hero">
  <div class="container">
    <div class="page-hero-inner">
      <div>
        <p class="eyebrow">Akun Saya</p>
        <h1 id="profile-headline">Profil</h1>
        <p>Kelola akun, riwayat pesanan, dan ulasan Anda.</p>
      </div>
      <div class="chip-row" id="role-chip"></div>
    </div>
  </div>
</div>

<main class="container page-body">
  <div style="display:grid;grid-template-columns:300px 1fr;gap:1.75rem;align-items:start" id="profile-layout">

    <!-- Left: profile card -->
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div class="card" style="text-align:center">
        <div id="profile-avatar" style="width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;font-size:1.8rem;font-weight:800;display:grid;place-items:center;margin:0 auto .85rem"></div>
        <div id="profile-name" style="font-weight:700;font-size:1.1rem;margin-bottom:.25rem"></div>
        <div id="profile-username" style="font-size:.8rem;color:var(--ink-faint);margin-bottom:.25rem"></div>
        <div id="profile-email" style="font-size:.83rem;color:var(--ink-mid);margin-bottom:1rem"></div>
        <div style="display:flex;flex-direction:column;gap:.5rem">
          <a href="seller.html" class="btn-outline btn-full">📦 Dashboard Penjual</a>
          <button class="btn-danger btn-full" id="logout-btn">Keluar</button>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin-bottom:.85rem">Statistik Akun</h3>
        <div style="display:flex;flex-direction:column;gap:.1rem" id="profile-stats"></div>
      </div>
    </div>

    <!-- Right: tabs -->
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div style="display:flex;gap:.3rem;background:var(--bg-input);padding:.3rem;border-radius:var(--r-md);border:1px solid var(--border)">
        <button class="profile-tab active" id="tab-orders">🛒 Pesanan Saya</button>
        <button class="profile-tab" id="tab-reviews-given">✍️ Ulasan Dibuat</button>
        <button class="profile-tab" id="tab-reviews-received">⭐ Ulasan Diterima</button>
      </div>

      <!-- Orders panel -->
      <div id="orders-panel">
        <div id="ordersList" class="orders-list"></div>
      </div>

      <!-- Reviews Given panel -->
      <div id="reviews-given-panel" class="hidden">
        <div class="card" style="margin-bottom:.5rem;padding:.85rem 1rem;background:var(--blue-lo);border-color:rgba(59,130,246,.2)">
          <p style="font-size:.83rem;color:#93c5fd">✍️ <strong>Ulasan yang kamu tulis</strong> untuk produk yang sudah kamu beli dari penjual lain.</p>
        </div>
        <div id="reviews-given-list"></div>
      </div>

      <!-- Reviews Received panel -->
      <div id="reviews-received-panel" class="hidden">
        <div class="card" style="margin-bottom:.5rem;padding:.85rem 1rem;background:var(--yellow-lo);border-color:rgba(234,179,8,.2)">
          <p style="font-size:.83rem;color:#fde68a">⭐ <strong>Ulasan yang diterima</strong> dari pembeli untuk produk-produk yang kamu jual.</p>
        </div>
        <div id="reviews-received-list"></div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">© 2026 RHN Preloved</footer>

<style>
  .profile-tab {
    flex: 1; padding: .6rem .5rem; border-radius: var(--r-sm);
    font-size: .8rem; font-weight: 600; color: var(--ink-faint);
    background: none; border: none; cursor: pointer;
    transition: all var(--t); font-family: 'Sora', sans-serif;
    white-space: nowrap;
  }
  .profile-tab.active { background: var(--bg-card); color: var(--ink); box-shadow: var(--shadow-sm); }
  @media(max-width:768px) {
    #profile-layout { grid-template-columns: 1fr; }
    .profile-tab { font-size: .72rem; padding: .5rem .3rem; }
  }
</style>

<script src="app.js"></script>
<script>
  requireAuth();
  renderNav();
  renderProfilePage();
</script>
</body>
</html>
